<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>System Settings</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/settings.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>Karnesh Technology</h2>

        </div>

        <ul>

            <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="employee.html"><i class="fa fa-users"></i> Employees</a></li>
            <li><a href="department.html"><i class="fa fa-building"></i> Departments</a></li>
            <li><a href="attendance.html"><i class="fa fa-calendar-check"></i> Attendance</a></li>
            <li><a href="leave.html"><i class="fa fa-plane"></i> Leave</a></li>
            <li><a href="payroll.html"><i class="fa fa-money-bill-wave"></i> Payroll</a></li>
            <li><a href="reports.html"><i class="fa fa-chart-bar"></i> Reports</a></li>

            <li class="active">

                <a href="settings.html">

                    <i class="fa fa-gear"></i>

                    Settings

                </a>

            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main">

        <header class="topbar">

            <h1>System Settings</h1>

            <button onclick="logout()">

                Logout

            </button>

        </header>

        <div class="settings-card">

            <form id="settingsForm">

                <div class="grid">

                    <div class="form-group">

                        <label>Company Name</label>

                        <input
                            type="text"
                            id="company_name"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Company Email</label>

                        <input
                            type="email"
                            id="company_email"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Company Phone</label>

                        <input
                            type="text"
                            id="company_phone">

                    </div>

                    <div class="form-group">

                        <label>Website</label>

                        <input
                            type="text"
                            id="company_website">

                    </div>

                    <div class="form-group">

                        <label>Working Hours Start</label>

                        <input
                            type="time"
                            id="working_hours_start">

                    </div>

                    <div class="form-group">

                        <label>Working Hours End</label>

                        <input
                            type="time"
                            id="working_hours_end">

                    </div>

                    <div class="form-group">

                        <label>Leave Per Year</label>

                        <input
                            type="number"
                            id="leave_per_year">

                    </div>

                    <div class="form-group">

                        <label>Currency</label>

                        <select id="currency">

                            <option value="INR">INR</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>Time Zone</label>

                        <select id="timezone">

                            <option value="Asia/Kolkata">Asia/Kolkata</option>
                            <option value="UTC">UTC</option>
                            <option value="Europe/London">Europe/London</option>
                            <option value="America/New_York">America/New_York</option>

                        </select>

                    </div>

                </div>

                <div class="form-group">

                    <label>Company Address</label>

                    <textarea
                        id="company_address"
                        rows="4">

                    </textarea>

                </div>

                <button
                    class="save-btn"
                    type="submit">

                    <i class="fa fa-save"></i>

                    Save Settings

                </button>

            </form>

        </div>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
