<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Employee</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/employee.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <h2>HR Portal</h2>
        </div>

        <ul>

            <li>
                <a href="dashboard.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li class="active">
                <a href="employee.html">
                    <i class="fa-solid fa-users"></i>
                    Employees
                </a>
            </li>

        </ul>

    </aside>


    <main class="main">

        <div class="topbar">

            <h1>Add Employee</h1>

            <button onclick="window.location='employee.html'">
                Back
            </button>

        </div>


        <form id="employeeForm" class="employee-form">

            <div class="form-grid">

                <div class="form-group">
                    <label>Employee Code</label>
                    <input type="text" id="employee_code" required>
                </div>

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="first_name" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="last_name" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>

                    <select id="gender">

                        <option value="Male">Male</option>
                        <option value="Female">Female</option>

                    </select>

                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone">
                </div>

                <div class="form-group">
                    <label>Designation</label>
                    <input type="text" id="designation">
                </div>

                <div class="form-group">
                    <label>Salary</label>
                    <input type="number" id="salary">
                </div>

                <div class="form-group">
                    <label>Joining Date</label>
                    <input type="date" id="joining_date">
                </div>

                <div class="form-group">
                    <label>Department</label>

                    <select id="department_id">

                    </select>

                </div>

                <div class="form-group">
                    <label>User ID</label>
                    <input type="number" id="user_id">
                </div>

                <div class="form-group">

                    <label>Status</label>

                    <select id="status">

                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>

                    </select>

                </div>

            </div>

            <div class="form-group">

                <label>Address</label>

                <textarea
                        id="address"
                        rows="4">

                </textarea>

            </div>

            <button
                    class="submit-btn"
                    type="submit">

                Save Employee

            </button>

        </form>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/add_employee.js"></script>

</body>
</html>
