<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/profile.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <h2>HR Portal</h2>
        </div>

        <ul>

            <li>
                <a href="dashboard.html">
                    <i class="fa-solid fa-house"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="employee.html">
                    <i class="fa-solid fa-users"></i>
                    Employees
                </a>
            </li>

            <li>
                <a href="attendance.html">
                    <i class="fa-solid fa-calendar-check"></i>
                    Attendance
                </a>
            </li>

            <li>
                <a href="leave.html">
                    <i class="fa-solid fa-plane-departure"></i>
                    Leave
                </a>
            </li>

            <li>
                <a href="reports.html">
                    <i class="fa-solid fa-chart-column"></i>
                    Reports
                </a>
            </li>

            <li class="active">
                <a href="profile.html">
                    <i class="fa-solid fa-user"></i>
                    Profile
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main">

        <header class="topbar">

            <h1>My Profile</h1>

            <button onclick="logout()">

                Logout

            </button>

        </header>

        <!-- Profile Card -->

        <div class="profile-card">

            <div class="profile-left">

                <img
                    src="assets/logo.png"
                    id="profileImage"
                    class="profile-image"
                    alt="Profile">

                <h2 id="fullName">

                    Loading...

                </h2>

                <p id="designation">

                    -

                </p>

                <span id="roleBadge"
                      class="role-badge">

                    -

                </span>

            </div>

            <div class="profile-right">

                <form id="profileForm">

                    <div class="form-grid">

                        <div class="form-group">

                            <label>Employee Code</label>

                            <input
                                type="text"
                                id="employee_code"
                                readonly>

                        </div>

                        <div class="form-group">

                            <label>Department</label>

                            <input
                                type="text"
                                id="department"
                                readonly>

                        </div>

                        <div class="form-group">

                            <label>Email</label>

                            <input
                                type="email"
                                id="email">

                        </div>

                        <div class="form-group">

                            <label>Phone</label>

                            <input
                                type="text"
                                id="phone">

                        </div>

                    </div>

                    <div class="form-group">

                        <label>Address</label>

                        <textarea
                            id="address"
                            rows="4">

                        </textarea>

                    </div>

                    <button
                        class="save-btn"
                        type="submit">

                        Save Profile

                    </button>

                </form>

            </div>

        </div>

        <!-- Change Password -->

        <div class="password-card">

            <h2>

                Change Password

            </h2>

            <form id="passwordForm">

                <div class="form-group">

                    <label>Current Password</label>

                    <input
                        type="password"
                        id="current_password">

                </div>

                <div class="form-group">

                    <label>New Password</label>

                    <input
                        type="password"
                        id="new_password">

                </div>

                <div class="form-group">

                    <label>Confirm Password</label>

                    <input
                        type="password"
                        id="confirm_password">

                </div>

                <button
                    class="change-btn"
                    type="submit">

                    Change Password

                </button>

            </form>

        </div>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
