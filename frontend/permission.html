<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Role Permissions</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/permission.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>Karnesh Technology</h2>

        </div>

        <ul>

            <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="employee.html"><i class="fa fa-users"></i> Employees</a></li>
            <li><a href="attendance.html"><i class="fa fa-calendar-check"></i> Attendance</a></li>
            <li><a href="leave.html"><i class="fa fa-plane"></i> Leave</a></li>
            <li><a href="payroll.html"><i class="fa fa-money-bill-wave"></i> Payroll</a></li>
            <li><a href="recruitment.html"><i class="fa fa-user-plus"></i> Recruitment</a></li>
            <li><a href="performance.html"><i class="fa fa-chart-line"></i> Performance</a></li>
            <li><a href="notifications.html"><i class="fa fa-bell"></i> Notifications</a></li>
            <li><a href="documents.html"><i class="fa fa-folder-open"></i> Documents</a></li>
            <li><a href="assets.html"><i class="fa fa-laptop"></i> Assets</a></li>

            <li class="active">

                <a href="permission.html">

                    <i class="fa fa-user-shield"></i>

                    Role Permissions

                </a>

            </li>

            <li><a href="reports.html"><i class="fa fa-chart-bar"></i> Reports</a></li>
            <li><a href="profile.html"><i class="fa fa-user"></i> Profile</a></li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <header class="topbar">

            <h1>Role Permission Management</h1>

            <button onclick="logout()">

                Logout

            </button>

        </header>

        <!-- Role Selection -->

        <section class="permission-card">

            <div class="form-group">

                <label>Select Role</label>

                <select id="roleSelect">

                    <option value="1">Administrator</option>
                    <option value="2">HR Manager</option>
                    <option value="3">Employee</option>

                </select>

            </div>

            <button
                class="load-btn"
                onclick="loadRolePermissions()">

                Load Permissions

            </button>

        </section>

        <!-- Search -->

        <div class="toolbar">

            <input

                type="text"

                id="searchPermission"

                placeholder="Search Permission"

                onkeyup="searchPermission()">

        </div>

        <!-- Permission Table -->

        <section class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>Select</th>

                        <th>Module</th>

                        <th>Permission</th>

                        <th>Description</th>

                    </tr>

                </thead>

                <tbody id="permissionTable">

                </tbody>

            </table>

        </section>

        <!-- Save -->

        <div class="save-section">

            <button
                class="save-btn"
                onclick="savePermissions()">

                <i class="fa fa-save"></i>

                Save Permissions

            </button>

        </div>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/permission.js"></script>

</body>
</html>
